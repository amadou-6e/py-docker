name: Test On Deploy

on:
  push:
    branches:
      - "*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  tests:
    name: ${{ matrix.test_file }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/test_manager.py
          - tests/test_notebooks.py
          - tests/test_postgres.py
          - tests/test_postgres_pgvector.py
          - tests/test_mysql.py
          - tests/test_mongodb.py
          - tests/test_mssql.py
          - tests/test_ollama.py
          - tests/test_neo4j.py
          - tests/test_redis.py
          - tests/test_opensearch.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg2 apt-transport-https ca-certificates lsb-release
          sudo apt-get install -y unixodbc unixodbc-dev

      - name: Install Microsoft ODBC Driver 18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor --batch --yes -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list" | sudo tee /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,rag,graph]"

      - name: Register Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Show Docker info
        run: docker info

      - name: Check NumPy docstrings
        if: matrix.test_file == 'tests/test_manager.py'
        run: python -m pydocstyle docker_db

      - name: Run tests
        run: python -m pytest -vv -s --timeout=600 --timeout-method=thread ${{ matrix.test_file }}

  publish:
    name: Publish to PyPI
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/py-dockerdb
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
